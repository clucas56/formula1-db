# =============================================================================
# Webster — Apache vhost for f1.charleslucas562.com
#
# This goes on the WEBSTER VM, not in the Docker stack. It replaces the old
# F1 vhost that pointed at the autossh tunnel to debian-app.
#
# Install location on webster:
#   /etc/apache2/sites-available/f1.charleslucas562.com.conf
# Enable with:
#   sudo a2ensite f1.charleslucas562.com.conf
#   sudo systemctl reload apache2
#
# PRE-FLIGHT: back up the existing F1 vhost first —
#   sudo cp /etc/apache2/sites-available/<old-f1-vhost>.conf ~/apache-backup/
#
# The portfolio vhost (charleslucas562.com) is a SEPARATE file and is NOT
# touched by any of this.
# =============================================================================

<VirtualHost *:80>
    ServerName f1.charleslucas562.com

    # Cloudflare terminates HTTPS at the edge; webster<->Cloudflare is the
    # tunnel, so plain :80 here is correct. No cert needed on webster.

    # --- Reverse proxy target ---------------------------------------------
    # Points at the FastAPI container's port 8000 on the Docker host.
    #
    # If using an autossh tunnel on webster (see HANDOFF Phase 5), the tunnel
    # listens on webster's localhost, so the target is:
    #     http://127.0.0.1:8000/
    # If webster can reach the Docker host directly (static route / same LAN),
    # use the Docker host's IP instead:
    #     http://<docker-host-ip>:8000/
    ProxyPreserveHost On
    ProxyPass        / http://127.0.0.1:8000/
    ProxyPassReverse / http://127.0.0.1:8000/

    # Pass the real client IP through to FastAPI
    RequestHeader set X-Forwarded-Proto "https"

    ProxyTimeout 60

    ErrorLog  ${APACHE_LOG_DIR}/f1_error.log
    CustomLog ${APACHE_LOG_DIR}/f1_access.log combined
</VirtualHost>

# Required Apache modules (enable once on webster if not already):
#   sudo a2enmod proxy proxy_http headers
#   sudo systemctl restart apache2
