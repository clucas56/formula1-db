<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circuits | F1 Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Courier New', Courier, monospace; background-color: #111111; color: #ffffff; }
        .container { max-width: 960px; margin: 0 auto; padding: 20px; }
        .back-link { color: #e10600; text-decoration: none; font-size: 12px; letter-spacing: 2px; }
        .back-link:hover { color: #ffffff; }
        nav { display: flex; justify-content: space-between; margin: 15px 0 30px 0; gap: 15px; }
        .nav-link { flex: 1; text-align: center; color: #e10600; text-decoration: none; font-size: 11px; letter-spacing: 3px; padding: 7px 0; border-top: 2px solid #e10600; border-bottom: 2px solid #e10600; }
        .nav-link:hover { color: #ffffff; }
        h2 { color: #e10600; font-size: 14px; letter-spacing: 4px; text-transform: uppercase; margin: 40px 0 10px 0; padding-bottom: 6px; border-bottom: 1px solid #e10600; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 40px; font-size: 14px; }
        th { background-color: #1a1a1a; color: #e10600; padding: 10px 12px; text-align: left; letter-spacing: 2px; font-size: 13px; text-transform: uppercase; border-bottom: 1px solid #333333; }
        td { padding: 8px 12px; border-bottom: 1px solid #1e1e1e; color: #cccccc; }
        tr:hover td { background-color: #1a1a1a; color: #ffffff; }
        .coords { color: #444444; font-size: 11px; }
        .footer { text-align: center; padding: 30px 0; color: #444444; font-size: 11px; letter-spacing: 2px; border-top: 1px solid #1e1e1e; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-link">← BACK TO DASHBOARD</a>

        <nav>
            <a href="/seasons" class="nav-link">SEASONS</a>
            <a href="/drivers" class="nav-link">DRIVERS</a>
            <a href="/circuits" class="nav-link">CIRCUITS</a>
        </nav>

        <h2>All Circuits &nbsp;<span style="color:#444444; font-size:11px; letter-spacing:2px;">{{ circuits | length }} total</span></h2>
        <table>
            <thead>
                <tr>
                    <th>Circuit</th>
                    <th>Country</th>
                    <th>Coordinates</th>
                </tr>
            </thead>
            <tbody>
                {% for row in circuits %}
                <tr>
                    <td>{{ row[1] }}</td>
                    <td>{{ row[2] }}</td>
                    <td class="coords">{{ "%.4f"|format(row[3]) }}, {{ "%.4f"|format(row[4]) }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <div class="footer">F1 DATA PLATFORM &nbsp;|&nbsp; charleslucas562.com &nbsp;|&nbsp; 2026</div>
    </div>
</body>
</html>
