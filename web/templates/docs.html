<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documentation | F1 Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #111111;
            color: #cccccc;
            line-height: 1.8;
        }
        .container { max-width: 960px; margin: 0 auto; padding: 40px 20px; }
        .back-link {
            color: #e10600;
            text-decoration: none;
            font-size: 12px;
            letter-spacing: 2px;
        }
        .back-link:hover { color: #ffffff; }
        .content { margin-top: 40px; }
        .content h1 {
            color: #e10600;
            font-size: 22px;
            letter-spacing: 3px;
            text-transform: uppercase;
            border-bottom: 1px solid #e10600;
            padding-bottom: 10px;
            margin: 40px 0 20px 0;
        }
        .content h2 {
            color: #e10600;
            font-size: 16px;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-bottom: 1px solid #333333;
            padding-bottom: 8px;
            margin: 40px 0 15px 0;
        }
        .content h3 {
            color: #ffffff;
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin: 25px 0 10px 0;
        }
        .content p {
            margin-bottom: 15px;
            font-size: 13px;
            color: #cccccc;
        }
        .content code {
            background-color: #1a1a1a;
            color: #e10600;
            padding: 2px 6px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }
        .content pre {
            background-color: #1a1a1a;
            border-left: 3px solid #e10600;
            padding: 16px;
            overflow-x: auto;
            margin: 15px 0;
            font-size: 12px;
            line-height: 1.6;
        }
        .content pre code {
            background: none;
            color: #cccccc;
            padding: 0;
        }
        .content table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            font-size: 12px;
        }
        .content th {
            background-color: #1a1a1a;
            color: #e10600;
            padding: 10px 12px;
            text-align: left;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-bottom: 1px solid #333333;
        }
        .content td {
            padding: 10px 12px;
            border-bottom: 1px solid #1e1e1e;
            color: #cccccc;
        }
        .content ul, .content ol {
            margin: 10px 0 15px 20px;
            font-size: 13px;
        }
        .content li { margin-bottom: 6px; }
        .content a { color: #e10600; text-decoration: none; }
        .content a:hover { color: #ffffff; }
        .content blockquote {
            border-left: 3px solid #e10600;
            padding: 10px 16px;
            margin: 15px 0;
            background-color: #1a1a1a;
            color: #888888;
            font-size: 12px;
        }
        .footer {
            text-align: center;
            padding: 30px 0;
            color: #444444;
            font-size: 11px;
            letter-spacing: 2px;
            border-top: 1px solid #1e1e1e;
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-link">← BACK TO DASHBOARD</a>
        <div class="content">
            {{ content | safe }}
        </div>
        <div class="footer">F1 DATA PLATFORM &nbsp;|&nbsp; charleslucas562.com &nbsp;|&nbsp; 2026</div>
    </div>
</body>
</html>
